<!DOCTYPE html>
<html lang="en">
<head>
  <title>FastAPI Demo</title>
  
  <!-- Common head elements -->
  {% include 'partials/html_head.html' %}

  <!-- Prism.js CSS for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
  
  <!-- Index page specific styles -->
  <link rel="stylesheet" href="/assets/css/index.css">
</head>
<body class="bg-light">

<!-- Header -->
{% include 'partials/header.html' %}

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar Navigation (fixed, full height) -->
    <div class="col-md-3 position-fixed overflow-auto" style="top: 0; left: 0; height: 100vh; z-index: 100;">
      {% include 'partials/sidebar.html' %}
    </div>
    
    <!-- Main Content Area (9 columns with left offset) -->
    <div class="col-md-9 offset-md-3">
      <div class="p-3 py-5">
        <h1 class="mb-4">🚀 FastAPI + Bootstrap Demo</h1>

        <p class="lead">Click below to fetch data from <code>/api</code>:</p>

        <button id="fetchBtn" class="btn btn-primary">Fetch Data</button>

        <div id="response" class="mt-4 p-3 bg-white border rounded"></div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
{% include 'partials/footer.html' %}

<!-- Query Panel -->
{% include 'partials/query_panel.html' %}

<!-- Bootstrap JS (optional, for components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Partial JavaScript -->
<script src="/assets/js/partial-query-system.js"></script>
<script src="/assets/js/partial-sidebar.js"></script>

<!-- Index Page Specific JavaScript -->
<script src="/assets/js/index.js"></script>

</body>
</html>
