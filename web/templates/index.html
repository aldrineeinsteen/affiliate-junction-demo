<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastAPI Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your custom styles -->
  <link rel="stylesheet" href="/assets/custom.css">
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="mb-4">🚀 FastAPI + Bootstrap Demo</h1>

  <p class="lead">Click below to fetch data from <code>/api</code>:</p>

  <button id="fetchBtn" class="btn btn-primary">Fetch Data</button>

  <div id="response" class="mt-4 p-3 bg-white border rounded"></div>
</div>

<!-- Bootstrap JS (optional, for components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("fetchBtn").addEventListener("click", async () => {
  const res = await fetch("/api");
  const data = await res.json();
  document.getElementById("response").innerHTML =
    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
});
</script>

</body>
</html>
